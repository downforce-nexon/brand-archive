  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black: #0A0A0A;
    --white: #ffffff;
    --gray-1: #3A3A3A;
    --gray-2: #7A7A7A;
    --gray-3: #B8B8B8;
    --gray-4: #E2E2E0;
    --gray-5: #D8D8D8;
    --nav-h: 72px;
    --edge: 48px;
  }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: var(--white);
    color: var(--black);
    -webkit-font-smoothing: antialiased;
  }

  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--nav-h);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 var(--edge);
    background: rgba(255,255,255,0.96);
    backdrop-filter: blur(12px);
    z-index: 200;
    transition: transform 0.35s cubic-bezier(0.25,0.46,0.45,0.94);
  }
  nav.hidden { transform: translateY(-100%); }

  .nav-brand {
    display: flex;
    align-items: baseline;
    gap: 0;
    text-decoration: none;
  }
  .nav-ba svg {
    height: 28px;
    width: auto;
    display: block;
  }

  /* 우측 메뉴 */
  .nav-links {
    display: flex;
    align-items: center;
    gap: 0;
  }
  .nav-links a {
    font-size: 14px;
    font-weight: 400;
    color: var(--black);
    text-decoration: none;
    padding: 5px 14px;
    letter-spacing: 0.02em;
    transition: font-weight 0.1s;
    position: relative;
    display: inline-flex;
    flex-direction: column;
    align-items: center;
  }
  .nav-links a::after {
    content: attr(data-text);
    font-weight: 700;
    visibility: hidden;
    height: 0;
    overflow: hidden;
    pointer-events: none;
  }
  .nav-links a:last-child { padding-right: 0; }
  .nav-links a:hover { font-weight: 700; }

  /* ── CATEGORY BAR ── */
  .cat-bar {
    position: sticky;
    top: var(--nav-h);
    z-index: 100;
    background: rgba(255,255,255,0.96);
    backdrop-filter: blur(12px);
    padding: 36px 13% 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: transform 0.35s cubic-bezier(0.25,0.46,0.45,0.94);
  }
  .cat-bar.nav-hidden { transform: translateY(calc(-1 * var(--nav-h))); }
  .cat-bar.sticky-mode { padding: 22px 13%; }

  .cat-btn {
    background: none;
    border: none;
    font-family: 'Pretendard', sans-serif;
    font-size: 16px;
    font-weight: 700;
    font-synthesis: none;
    letter-spacing: 0.01em;
    text-transform: uppercase;
    color: var(--gray-3);
    cursor: pointer;
    padding: 0;
    transition: color 0.2s;
    white-space: nowrap;
  }
  .cat-btn:hover { color: var(--gray-1); }
  .cat-btn.active { color: var(--black); }

  /* ── IMAGE GRID ── */
  .grid-wrap {
    padding: 24px 13% 120px;
  }
  .project-list {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .project-list.spaced {
    gap: 48px;
  }
  .row-single { display: grid; grid-template-columns: 1fr; }
  .row-double { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  .project-card {
    display: block;
    text-decoration: none;
    color: inherit;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .project-card.visible { opacity: 1; transform: translateY(0); }

  /* Featured 첫 번째: wide */
  .thumb-wide {
    width: 100%; padding-bottom: 62%;
    position: relative; background: var(--gray-5); overflow: hidden;
  }
  /* 나머지 모두 동일 비율 */
  .thumb-std {
    width: 100%; padding-bottom: 75%;
    position: relative; background: var(--gray-5); overflow: hidden;
  }
  .thumb-bg {
    position: absolute; inset: 0;
    transition: filter 0.3s;
  }

  .card-info { padding: 20px 0 8px; }
  .card-meta {
    font-size: 11px; font-weight: 400;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--gray-3); margin-bottom: 6px;
  }
  .card-title {
    font-size: 14px; font-weight: 400;
    line-height: 1.45; color: var(--black);
    transition: color 0.2s;
  }
  .project-card:hover .thumb-bg { filter: brightness(0.95); }
  .project-card:hover .card-title { color: var(--gray-2); }

  /* ── FOOTER ── */
  footer {
    border-top: 1px solid var(--gray-4);
    padding: 36px var(--edge);
    display: flex;
    justify-content: space-between;
  }
  footer span { font-size: 12px; color: var(--gray-3); }

  @media (max-width: 768px) {
    :root { --edge: 24px; --img-edge: 24px; }
    .nav-b, .nav-archive { font-size: 22px; }
    .cat-btn { font-size: 13px; }
    .row-double { grid-template-columns: 1fr; gap: 12px; }
  }
</style>
</head>

<script>
const projects = [
  { id:1, title:"넥슨 브랜드 아이덴티티 리뉴얼",   category:"Branding", filter:["all","branding"], color:"#D8D8D8" },
  { id:2, title:"메이플스토리 20주년 캠페인",        category:"Branding", filter:["all","branding"], color:"#D4D4D4" },
  { id:3, title:"넥슨 아레나 공간 브랜딩",           category:"Graphic",  filter:["all","graphic"],  color:"#DADADA" },
  { id:4, title:"던전앤파이터 브랜드 캠페인",        category:"Film",     filter:["film"],           color:"#D6D6D6" },
  { id:5, title:"넥슨 디지털 가이드라인 시스템",     category:"Graphic",  filter:["graphic"],        color:"#DCDCDC" },
  { id:6, title:"넥슨 코리아 채용 브랜딩",           category:"Branding", filter:["branding"],       color:"#D2D2D2" },
  { id:7, title:"지스타 2023 브랜드 경험",           category:"Graphic",  filter:["all","graphic"],  color:"#D8DAD6" },
  { id:8, title:"메이플스토리 월드컵 캠페인",        category:"Film",     filter:["film"],           color:"#DAD8D8" },
  { id:9, title:"넥슨 연간 리포트 디자인",           category:"Graphic",  filter:["graphic"],        color:"#D8D8DA" },
];

function renderProjects(filter) {
  const list = document.getElementById('projectList');
  const filtered = projects.filter(p => p.filter.includes(filter));
  list.innerHTML = '';
  if (!filtered.length) return;

  // Featured: 기존 간격 / 나머지: 넓은 간격
  if (filter === 'all') {
    list.classList.remove('spaced');
  } else {
    list.classList.add('spaced');
  }

  // FEATURED: 첫 번째 wide + 나머지 2열
  // 나머지 필터: 모두 2열
  if (filter === 'all') {
    const r1 = document.createElement('div');
    r1.className = 'row-single';
    r1.appendChild(makeCard(filtered[0], true, true));
    list.appendChild(r1);

    for (let i = 1; i < filtered.length; i += 2) {
      const row = document.createElement('div');
      row.className = 'row-double';
      row.appendChild(makeCard(filtered[i], false, true));
      if (filtered[i+1]) row.appendChild(makeCard(filtered[i+1], false, true));
      list.appendChild(row);
    }
  } else {
    // Branding / Graphic / Film: 첫 번째부터 모두 2열
    for (let i = 0; i < filtered.length; i += 2) {
      const row = document.createElement('div');
      row.className = 'row-double';
      row.appendChild(makeCard(filtered[i], false));
      if (filtered[i+1]) row.appendChild(makeCard(filtered[i+1], false));
      list.appendChild(row);
    }
  }

  requestAnimationFrame(() => {
    document.querySelectorAll('.project-card').forEach((el, i) => {
      setTimeout(() => el.classList.add('visible'), i * 60);
    });
  });
}

function makeCard(p, wide, hideInfo = false) {
  const a = document.createElement('a');
  a.className = 'project-card';
  a.href = `project.html?id=${p.id}`;
  a.innerHTML = `
    <div class="${wide ? 'thumb-wide' : 'thumb-std'}">
      <div class="thumb-bg" style="background:${p.color};"></div>
    </div>
    ${hideInfo ? '' : `<div class="card-info">
      <p class="card-meta">${p.category}</p>
      <h2 class="card-title">${p.title}</h2>
    </div>`}`;
  return a;
}

document.querySelectorAll('.cat-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderProjects(btn.dataset.filter);
  });
});

renderProjects('all');

let lastY = 0;
const nav = document.getElementById('mainNav');
const catBar = document.getElementById('catBar');
window.addEventListener('scroll', () => {
  const y = window.scrollY;
  if (y > lastY && y > 80) {
    nav.classList.add('hidden');
    catBar.classList.add('nav-hidden');
  } else {
    nav.classList.remove('hidden');
    catBar.classList.remove('nav-hidden');
  }
  // sticky-mode: cat-bar가 상단에 붙었을 때 (nav가 숨겨진 상태)
  if (y > 80) {
    catBar.classList.add('sticky-mode');
  } else {
    catBar.classList.remove('sticky-mode');
  }
  lastY = y;
}, { passive: true });
</script>
</body>
</html>
