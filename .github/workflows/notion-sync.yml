name: Sync Notion Data

on:
  schedule:
    - cron: '0 * * * *'  # 매 1시간마다 자동 실행
  workflow_dispatch:        # 수동 실행 버튼도 제공

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install node-fetch

      - name: Fetch Notion data
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: node fetch-notion.js

      - name: Commit and push data.json
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Update Notion data"
          git push
