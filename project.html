  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black: #0A0A0A;
    --white: #ffffff;
    --gray-1: #3A3A3A;
    --gray-2: #7A7A7A;
    --gray-3: #B8B8B8;
    --gray-4: #E2E2E0;
    --gray-5: #F0F0EE;
    --nav-h: 72px;
    --edge: 48px;
  }

  body {
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: var(--white);
    color: var(--black);
    -webkit-font-smoothing: antialiased;
  }

  /* ── NAV (index.html과 동일) ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--nav-h);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 var(--edge);
    background: rgba(255,255,255,0.96);
    backdrop-filter: blur(12px);
    z-index: 200;
    transition: transform 0.35s cubic-bezier(0.25,0.46,0.45,0.94);
  }
  nav.hidden { transform: translateY(-100%); }

  .nav-brand {
    display: flex;
    align-items: baseline;
    gap: 0;
    text-decoration: none;
  }
  .nav-ba svg {
    height: 28px;
    width: auto;
    display: block;
  }

  /* 우측 메뉴 — index.html과 동일 */
  .nav-links {
    display: flex;
    align-items: center;
    gap: 0;
  }
  .nav-links a {
    font-size: 14px;
    font-weight: 400;
    color: var(--black);
    text-decoration: none;
    padding: 5px 14px;
    letter-spacing: 0.02em;
    transition: font-weight 0.1s;
    position: relative;
    display: inline-flex;
    flex-direction: column;
    align-items: center;
  }
  .nav-links a::after {
    content: attr(data-text);
    font-weight: 700;
    visibility: hidden;
    height: 0;
    overflow: hidden;
    pointer-events: none;
  }
  .nav-links a:last-child { padding-right: 0; }
  .nav-links a:hover { font-weight: 700; }

  /* ── PROJECT HEADER ── */
  .project-header {
    padding: 120px var(--edge) 80px;
    max-width: 1400px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 80px;
  }

  .project-title {
    font-size: clamp(28px, 3.5vw, 48px);
    font-weight: 500;
    line-height: 1.15;
    letter-spacing: -0.03em;
    color: var(--black);
  }

  .project-meta { padding-top: 8px; }

  .meta-row {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 24px 0;
    border-bottom: 1px solid var(--gray-4);
  }
  .meta-row:first-child { padding-top: 0; }
  .meta-row:last-child { border-bottom: none; }

  .meta-label {
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gray-3);
  }
  .meta-value { font-size: 14px; font-weight: 400; color: var(--black); }

  /* ── DESCRIPTION ── */
  .project-desc-section {
    padding: 80px var(--edge);
    display: flex;
    justify-content: center;
  }
  .project-desc-inner {
    width: 100%;
    max-width: 560px;
    text-align: left;
  }
  .project-desc-title {
    font-size: 17px;
    font-weight: 700;
    line-height: 1.9;
    color: var(--black);
    margin-bottom: 0;
    word-break: keep-all;
  }
  .project-desc {
    font-size: 17px;
    font-weight: 400;
    line-height: 1.9;
    color: var(--gray-1);
    word-break: keep-all;
  }

  /* ── GALLERY ── */
  .gallery {
    padding: 0 var(--edge) 80px;
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .gallery-row { display: grid; gap: 2px; }
  .gallery-row.col-1 { grid-template-columns: 1fr; }
  .gallery-row.col-2 { grid-template-columns: 1fr 1fr; }
  .gallery-row.col-3 { grid-template-columns: 1fr 1fr 1fr; }

  .gallery-item {
    background: var(--gray-5);
    display: flex;
    align-items: center;
    justify-content: center;
    aspect-ratio: 16/9;
    overflow: hidden;
  }
  .gallery-item.tall { aspect-ratio: 3/4; }
  .gallery-placeholder {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gray-3);
  }

  /* ── FOOTER ── */
  footer {
    border-top: 1px solid var(--gray-4);
    padding: 36px var(--edge);
    display: flex;
    justify-content: space-between;
  }
  footer span { font-size: 12px; color: var(--gray-3); }

  /* ── CREDITS ── */
  .credits-section {
    padding: 80px var(--edge) 64px;
    text-align: center;
  }
  .credits-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--black);
    margin-bottom: 16px;
  }
  .credits-text {
    font-size: 14px;
    font-weight: 400;
    color: var(--gray-2);
    line-height: 1.8;
  }

  /* ── TAGS ── */
  .tags-section {
    padding: 0 var(--edge) 80px;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 8px;
  }
  .tag {
    display: inline-block;
    padding: 7px 16px;
    border: 1px solid var(--gray-4);
    border-radius: 100px;
    font-size: 12px;
    font-weight: 400;
    color: var(--gray-1);
    letter-spacing: 0.02em;
    white-space: nowrap;
  }

  /* ── RELATED PROJECTS ── */
  .related-section {
    padding: 80px var(--edge) 100px;
  }
  .related-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 40px;
  }
  .related-title {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--black);
  }
  .related-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
  }
  .related-card {
    display: block;
    text-decoration: none;
    color: inherit;
  }
  .related-thumb {
    width: 100%;
    padding-bottom: 66%;
    position: relative;
    background: var(--gray-5);
    overflow: hidden;
    margin-bottom: 20px;
  }
  .related-thumb .thumb-bg {
    position: absolute;
    inset: 0;
    transition: filter 0.3s, transform 0.55s cubic-bezier(0.25,0.46,0.45,0.94);
  }
  .related-card:hover .thumb-bg { filter: brightness(0.95); transform: scale(1.03); }
  .related-card-title {
    font-size: 15px;
    font-weight: 400;
    color: var(--black);
    line-height: 1.4;
    transition: color 0.2s;
  }
  .related-card-meta {
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--gray-3);
    margin-bottom: 6px;
  }
  .related-card:hover .related-card-title { color: var(--gray-2); }

  @media (max-width: 768px) {
    .related-grid { grid-template-columns: 1fr; }
  }

  /* FADE IN */
  .fade-up {
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
  }
  @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 768px) {
    :root { --edge: 24px; }
    .project-header { grid-template-columns: 1fr; gap: 48px; }
    .gallery-row.col-2, .gallery-row.col-3 { grid-template-columns: 1fr; }
  }
</style>
</head>

<section class="credits-section">
  <p class="credits-label">Credits</p>
  <p class="credits-text" id="projectCredits">—</p>
</section>

<!-- TAGS -->
<div class="tags-section" id="projectTags"></div>

<!-- RELATED PROJECTS -->
<section class="related-section">
  <div class="related-header">
    <h2 class="related-title">Other Projects</h2>
  </div>
  <div class="related-grid" id="relatedGrid"></div>
</section>

<script>
async function loadProject() {
  let projects = [];

  try {
    const res = await fetch('data.json?t=' + Date.now());
    const data = await res.json();
    projects = data.projects;
  } catch(e) {
    console.warn('data.json 로드 실패');
  }

  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  const project = projects.find(p => p.id === id) || projects[0];
  if (!project) return;

  // 기본 정보
  document.title = `${project.title} — B archive`;
  document.getElementById('projectTitle').textContent = project.title;
  document.getElementById('metaCategory').textContent = project.category;
  document.getElementById('metaProduct').textContent = project.product || '—';
  document.getElementById('metaTeam').textContent = 'BX디자인팀';
  document.getElementById('metaYear').textContent = project.year || '—';

  // Credits
  document.getElementById('projectCredits').textContent = project.credits || '—';

  // Tags
  const tagsEl = document.getElementById('projectTags');
  (project.tags || []).forEach(t => {
    const span = document.createElement('span');
    span.className = 'tag';
    span.textContent = t;
    tagsEl.appendChild(span);
  });

  // 노션 페이지 본문 섹션 렌더링
  const sectionsEl = document.getElementById('projectSections');
  if (project.sections && project.sections.length > 0) {
    sectionsEl.innerHTML = '';
    project.sections.forEach(section => {
      // 본문 텍스트
      if (section.title || section.body) {
        sectionsEl.innerHTML += `
          <section class="project-desc-section">
            <div class="project-desc-inner">
              ${section.title ? `<p class="project-desc-title">${section.title}</p>` : ''}
              ${section.body ? `<p class="project-desc">${section.body.replace(/\n/g, '<br>')}</p>` : ''}
            </div>
          </section>`;
      }
      // 이미지 & 비디오
      section.images.forEach(media => {
        const isVideo = typeof media === 'object' && media.type === 'video';
        const isImage = typeof media === 'object' && media.type === 'image';
        const url = typeof media === 'string' ? media : media.url;

        if (isVideo) {
          sectionsEl.innerHTML += `
            <section class="gallery">
              <div class="gallery-row col-1">
                <div class="gallery-item" style="background:#0A0A0A; overflow:hidden; aspect-ratio:21/9;">
                  <video src="${url}" controls playsinline style="width:100%;height:100%;object-fit:contain;"></video>
                </div>
              </div>
            </section>`;
        } else {
          sectionsEl.innerHTML += `
            <section class="gallery">
              <div class="gallery-row col-1">
                <div style="width:100%; line-height:0;">
                  <img src="${url}" alt="" style="width:100%;height:auto;display:block;">
                </div>
              </div>
            </section>`;
        }
      });
    });
  }

  // Related projects
  const related = projects
    .filter(p => p.id !== project.id)
    .sort((a, b) => (b.category === project.category ? 1 : 0) - (a.category === project.category ? 1 : 0))
    .slice(0, 3);

  const grid = document.getElementById('relatedGrid');
  related.forEach(p => {
    const a = document.createElement('a');
    a.className = 'related-card';
    a.href = `project.html?id=${p.id}`;
    const thumb = p.thumbnail
      ? `<img src="${p.thumbnail}" alt="${p.title}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;">`
      : `<div class="thumb-bg" style="background:${p.color};"></div>`;
    a.innerHTML = `
      <div class="related-thumb">${thumb}</div>
      <p class="related-card-meta">${p.category}</p>
      <p class="related-card-title">${p.title}</p>`;
    grid.appendChild(a);
  });

  // Nav hide/show on scroll
  let lastY = 0;
  const nav = document.getElementById('mainNav');
  window.addEventListener('scroll', () => {
    const y = window.scrollY;
    if (y > lastY && y > 80) nav.classList.add('hidden');
    else nav.classList.remove('hidden');
    lastY = y;
  }, { passive: true });
}

loadProject();
</script>
</body>
</html>
